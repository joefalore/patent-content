name: Score Patents

on:
  workflow_dispatch: # Manual trigger only — cron-job.org handles scheduling

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger scorer
        run: |
          curl -sf -X POST \
            -H "x-worker-secret: ${{ secrets.WORKER_AUTH_SECRET }}" \
            "${{ secrets.SCORER_WORKER_URL }}"
