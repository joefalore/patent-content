name = "patent-scorer"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Scheduling handled by GitHub Actions (.github/workflows/score-patents.yml)
# which POSTs to the worker HTTP endpoint every 5 minutes

[[d1_databases]]
binding = "DB"
database_name = "patent-tracker-db"
database_id = "5cedf456-980d-4276-8d4d-bdf169d92cf4"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "patent-images"

[vars]
DOMAIN = "inventiongenie.com"

# Secrets — set via: wrangler secret put <NAME>
# ANTHROPIC_API_KEY
# PATENTSVIEW_API_KEY
# WORKER_AUTH_SECRET   (shared with Next.js SCORER_WORKER_SECRET env var)
